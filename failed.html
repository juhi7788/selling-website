<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gradient-to-tr from-slate-100 via-sky-50 to-indigo-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-3xl shadow-2xl shadow-gray-200/70 max-w-md w-full p-8 md:p-10 border border-gray-100 text-center">
        <div class="w-24 h-24 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner border border-red-100">
            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </div>
        
        <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-3">Payment Failed</h2>
        <p class="text-gray-500 text-lg mb-8">Oops! Something went wrong with your transaction. Don't worry, no money was deducted.</p>

        <a href="checkout.html" class="inline-block w-full bg-gradient-to-r from-blue-600 to-violet-600 text-white font-bold py-4 rounded-2xl text-lg shadow-lg shadow-blue-500/30 transition-all duration-300 hover:shadow-blue-500/50 mb-3">
            Try Again
        </a>
        
        <a href="index.html" class="inline-block w-full text-gray-500 font-medium py-3 hover:text-gray-800 transition-colors">
            Cancel and Return to Store
        </a>
    </div>

</body>
</html>
