<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Premium Software Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .text-gradient {
            background: linear-gradient(135deg, #2563eb 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .premium-card { transition: all 0.3s ease-in-out; }
        .premium-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -10px rgba(37, 99, 235, 0.15), 0 15px 20px -10px rgba(168, 85, 247, 0.1);
        }
    </style>
</head>
<body class="bg-gradient-to-tr from-slate-100 via-sky-50 to-indigo-50 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="text-center mb-12 animate-fade-in">
        <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900 tracking-tight mb-4">
            Next-Gen <span class="text-gradient">Automation Software</span>
        </h1>
        <p class="text-gray-500 text-lg max-w-xl mx-auto">Boost your productivity with our premium tools. Secure, fast, and reliable.</p>
    </div>

    <div class="premium-card bg-white rounded-3xl shadow-xl shadow-gray-200/50 max-w-sm w-full p-8 border border-gray-100 relative overflow-hidden">
        <div class="absolute top-0 right-0 bg-gradient-to-r from-blue-500 to-violet-500 text-white text-xs font-bold px-4 py-1.5 rounded-bl-xl shadow-sm">
            BEST SELLER
        </div>
        <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mb-6 border border-blue-100">
            <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
            </svg>
        </div>
        <h3 class="text-2xl font-bold text-gray-900 mb-2">Pro DevKit v2.0</h3>
        <p class="text-gray-500 text-sm mb-6 pb-6 border-b border-gray-100">The ultimate toolkit for developers. Includes lifetime updates and priority support.</p>
        
        <div class="flex items-end gap-2 mb-6">
            <span class="text-4xl font-extrabold text-gray-900">₹4,999</span>
        </div>

        <ul class="space-y-3 mb-8">
            <li class="flex items-center text-sm text-gray-600 font-medium">
                <svg class="w-5 h-5 text-green-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                Instant Delivery (Email)
            </li>
            <li class="flex items-center text-sm text-gray-600 font-medium">
                <svg class="w-5 h-5 text-green-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                Lifetime Updates
            </li>
        </ul>

        <button onclick="proceedToCheckout('SW-001', 4999, 'Pro DevKit v2.0')" class="w-full bg-gradient-to-r from-gray-900 to-gray-800 hover:from-blue-600 hover:to-violet-600 text-white font-bold py-3.5 rounded-xl transition-all duration-300 shadow-lg hover:shadow-blue-500/30">
            Buy Now Securely
        </button>
    </div>

    <script>
        function proceedToCheckout(productId, price, productName) {
            const cartData = { id: productId, price: price, name: productName };
            localStorage.setItem('checkoutData', JSON.stringify(cartData));
            window.location.href = 'checkout.html';
        }
    </script>
</body>
</html>
